name: CI

on:
  push:
  pull_request:

# ArenaEdgeTest is excluded from the gating runs and reported separately: it
# exercises >64-byte over-alignment, a known limitation of the frozen arena
# allocator. (ArenaStressTest's absolute-nanosecond budgets are now enforced
# only in optimized builds and skipped otherwise, so it is not excluded.)
env:
  EXCLUDE_TESTS: "ArenaEdgeTest"

jobs:
  build-test:
    name: build & test (${{ matrix.cxx }}, ${{ matrix.build_type }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - { cxx: g++-13, build_type: Release }
          - { cxx: g++-14, build_type: Release }
          - { cxx: g++-14, build_type: Debug }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.cxx }}

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}
          -DBUILD_TESTS=ON -DBUILD_TOOLS=OFF

      - name: Build
        run: cmake --build build -j

      - name: Test
        working-directory: build
        run: ctest --output-on-failure -E "${EXCLUDE_TESTS}"

      - name: Arena tests (informational, non-gating)
        working-directory: build
        continue-on-error: true
        run: ctest --output-on-failure -R "${EXCLUDE_TESTS}"

  sanitizers:
    name: ASan + UBSan (g++-14)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y g++-14

      - name: Configure (ASan/UBSan)
        run: >
          cmake -S . -B build-san
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_CXX_COMPILER=g++-14
          -DBUILD_TESTS=ON -DBUILD_TOOLS=OFF
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build
        run: cmake --build build-san -j

      - name: Test under sanitizers
        working-directory: build-san
        env:
          UBSAN_OPTIONS: print_stacktrace=1
        run: ctest --output-on-failure -E "${EXCLUDE_TESTS}"
